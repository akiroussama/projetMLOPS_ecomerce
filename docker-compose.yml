x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW_PROJECT_ROOT: /opt/airflow/project
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PYTHONPATH: /opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./:/opt/airflow/project
    - ./orchestration/dags:/opt/airflow/dags
    - ./orchestration/logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    mlflow:
      condition: service_started

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow/data
      - mlflow-artifacts:/mlflow/artifacts

  trainer:
    profiles: ["manual"]
    build:
      context: .
      dockerfile: docker/trainer/Dockerfile
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    depends_on:
      mlflow:
        condition: service_started

  bootstrap:
    profiles: ["bootstrap"]
    build:
      context: .
      dockerfile: docker/trainer/Dockerfile
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./scripts:/app/scripts
    depends_on:
      mlflow:
        condition: service_started
    command: ["bash", "scripts/bootstrap.sh"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-change-me}
      MODEL_DIR: /app/models
      PYTHONPATH: /app
    ports:
      - "8200:8000"
    volumes:
      - ./models:/app/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    environment:
      API_URL: http://api:8000
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-change-me}
    ports:
      - "8501:8501"
    volumes:
      - ./data/preprocessed:/app/data/preprocessed
    depends_on:
      api:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username airflow
      --password airflow
      --firstname Airflow
      --lastname Admin
      --role Admin
      --email airflow@example.com || true"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8280:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres-db-volume:
  mlflow-data:
  mlflow-artifacts:
